<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101010">
<meta name="description" content="KOBEM Runner, endless runner mobile do Bem Esportivo com moedas, power-ups, ranking, conquistas e Kobems desbloqueáveis.">
<title>KOBEM Runner | Bem Esportivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="kobem-runner-page">
<main class="runner-app" aria-label="KOBEM Runner">
  <section class="runner-phone" id="runnerShell">
    <canvas id="gameCanvas" width="900" height="1600" aria-label="KOBEM Runner"></canvas>

    <div class="runner-hud" id="runnerHud" aria-label="Informações da partida">
      <button class="hud-icon" id="pauseBtn" type="button" aria-label="Pausar">II</button>
      <div class="hud-card score-card"><span>Pontos</span><strong id="score">0</strong></div>
      <div class="hud-card coins-card"><span class="coin-dot"></span><strong id="coinsCount">0</strong></div>
      <div class="hud-card lives-card" id="lives" aria-label="Vidas">❤️❤️❤️</div>
      <div class="hud-card combo-card"><span>Combo</span><strong>x<span id="combo">1</span></strong></div>
    </div>

    <div class="runner-bottom-hud">
      <div class="energy-card"><strong>⚡ <span id="energy">100</span>%</strong><i><b id="energyBar"></b></i></div>
      <div class="distance-card"><span>Distância</span><strong id="distance">0,0 km</strong></div>
    </div>

    <div class="runner-controls" aria-label="Controles">
      <button id="leftBtn" type="button" aria-label="Mover para esquerda">←</button>
      <button id="turboBtn" type="button" aria-label="Correr com turbo">CORRER</button>
      <button id="rightBtn" type="button" aria-label="Mover para direita">→</button>
    </div>

    <section class="runner-menu" id="menu" aria-label="Tela inicial">
      <div class="brand-lockup">
        <img src="img/Bem Esportivo Logo Laranja@33x.png" alt="Bem Esportivo">
      </div>
      <div class="runner-title">
        <strong>KOBEM</strong>
        <span>RUNNER</span>
        <em>DRIBLE • CORRA • EVOLUA!</em>
      </div>
      <div class="menu-robot" aria-hidden="true"></div>
      <div class="menu-actions">
        <button id="playBtn" class="primary" type="button">JOGAR <span>▶</span></button>
        <button id="rankingBtn" type="button">🏆 Ranking</button>
        <button id="achievementsBtn" type="button">🏅 Conquistas</button>
        <button id="settingsBtn" type="button">⚙ Configurações</button>
        <button id="kobemsBtn" type="button">⚡ Kobems</button>
      </div>
    </section>

    <section class="runner-panel is-hidden" id="rankingPanel" aria-hidden="true">
      <div class="panel-card">
        <button class="panel-close" data-close-panel type="button">×</button>
        <h2>Ranking</h2>
        <label class="name-field">Nome <input id="playerName" maxlength="18" autocomplete="nickname" placeholder="Você"></label>
        <ol class="ranking-list" id="rankingList"></ol>
      </div>
    </section>

    <section class="runner-panel is-hidden" id="achievementsPanel" aria-hidden="true">
      <div class="panel-card">
        <button class="panel-close" data-close-panel type="button">×</button>
        <h2>Conquistas</h2>
        <div class="achievement-grid" id="achievementsList"></div>
      </div>
    </section>

    <section class="runner-panel is-hidden" id="kobemsPanel" aria-hidden="true">
      <div class="panel-card">
        <button class="panel-close" data-close-panel type="button">×</button>
        <h2>Kobems</h2>
        <div class="kobem-grid" id="kobemsList"></div>
      </div>
    </section>

    <section class="runner-panel is-hidden" id="settingsPanel" aria-hidden="true">
      <div class="panel-card">
        <button class="panel-close" data-close-panel type="button">×</button>
        <h2>Configurações</h2>
        <label class="toggle-row"><span>Sons</span><input id="soundToggle" type="checkbox" checked></label>
        <label class="toggle-row"><span>Vibração</span><input id="vibrationToggle" type="checkbox" checked></label>
      </div>
    </section>

    <section class="game-over is-hidden" id="gameOverPanel" aria-hidden="true">
      <div class="game-over-card">
        <h2>GAME OVER</h2>
        <p id="gameOverSummary">Você correu 0,0 km.</p>
        <button id="restartBtn" class="primary" type="button">Jogar de novo</button>
        <button id="menuBtn" type="button">Menu</button>
      </div>
    </section>
  </section>
</main>
<script type="module" src="js/game.js"></script>
</body>
</html>
