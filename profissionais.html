<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profissionais | Bem Esportivo</title>

  <meta name="description" content="Encontre profissionais de esporte, saúde e lazer perto de você." />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #fc6e02;
      --secondary: #9a5700;
      --dark: #1c1c1c;
      --light: #f8f9fa;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--light);
      color: var(--dark);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      padding: 60px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .hero p {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      border-radius: 30px;
      border: none;
      outline: none;
    }

    section {
      padding: 50px 0;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 10px;
    }

    .card h3 {
      color: var(--primary);
    }

    .detalhes {
      margin-top: 40px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      background: var(--primary);
      color: #fff;
      padding: 12px 20px;
      border-radius: 30px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #fff;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header class="hero">
    <div class="container">
      <h1>Encontre Profissionais</h1>
      <p>Saúde, esporte e lazer em um só lugar</p>
      <input type="text" id="busca" placeholder="Buscar profissional..." />
    </div>
  </header>

  <section>
    <div class="container">
      <h2>Profissionais disponíveis</h2>
      <div class="grid" id="lista"></div>
      <div class="detalhes" id="detalhes"></div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Bem Esportivo</p>
  </footer>

  <script>
    const profissionais = [
      {
        nome: "Válter Igor",
        tipo: "Fotógrafo",
        especialidade: "Fotografia esportiva",
        foto: "img/profissionais/valter.jpg",
        whatsapp: "5511999999999"
      },
      {
        nome: "Bruno Rezende",
        tipo: "Personal Trainer",
        especialidade: "Treinamento funcional",
        foto: "img/profissionais/bruno.jpg",
        whatsapp: "5511988888888"
      },
      {
        nome: "Luciano",
        tipo: "Personal Soccer",
        especialidade: "Treino de futebol",
        foto: "img/profissionais/luciano.jpg",
        whatsapp: "5511977777777"
      },
      {
        nome: "Grasiele",
        tipo: "Psicóloga",
        especialidade: "Psicoterapia",
        foto: "img/profissionais/grasiele.jpg",
        whatsapp: "5511966666666"
      }
    ];

    const lista = document.getElementById("lista");
    const busca = document.getElementById("busca");
    const detalhes = document.getElementById("detalhes");

    function render(listaFiltrada) {
      lista.innerHTML = "";

      listaFiltrada.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${p.foto}" />
          <h3>${p.nome}</h3>
          <p>${p.tipo}</p>
        `;

        card.onclick = () => mostrarDetalhes(p);

        lista.appendChild(card);
      });
    }

    function mostrarDetalhes(p) {
      detalhes.innerHTML = `
        <h2>${p.nome}</h2>
        <p><strong>${p.tipo}</strong></p>
        <p>${p.especialidade}</p>

        <button class="btn" onclick='copiarCupom(${JSON.stringify(p)})'>
          Ganhar 5% OFF (BEM5)
        </button>
      `;
    }

    function copiarCupom(p) {
      navigator.clipboard.writeText("BEM5");
      alert("Cupom copiado!");

      detalhes.innerHTML += `
        <br><br>
        <a class="btn" 
           href="https://wa.me/${p.whatsapp}?text=Olá,%20quero%20usar%20o%20cupom%20BEM5" 
           target="_blank">
           Falar no WhatsApp
        </a>
      `;
    }

    busca.addEventListener("input", () => {
      const termo = busca.value.toLowerCase();

      const filtrados = profissionais.filter(p =>
        p.nome.toLowerCase().includes(termo) ||
        p.tipo.toLowerCase().includes(termo)
      );

      render(filtrados);
    });

    render(profissionais);
  </script>

</body>
</html>
