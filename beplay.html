<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beplay | Bem Esportivo</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Rubik', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      border-bottom: 2px solid #fa8a01;
    }

    header img {
      max-width: 180px;
      margin-bottom: 10px;
      animation: fadeDown 1s ease forwards;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .video-card {
      background: rgba(20,20,20,0.9);
      border-radius: 15px;
      padding: 15px;
      position: relative;
      transition: all 0.4s ease;
      transform: translateY(30px);
      opacity: 0;
    }

    .video-card.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .video-card:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 0 25px rgba(250, 138, 1, 0.6);
      backdrop-filter: blur(8px);
    }

    .video-thumb {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      margin-bottom: 10px;
      background-size: cover;
      background-position: center;
      transition: 0.3s ease;
    }

    .video-card h3 {
      margin: 10px 0;
      font-size: 1.2rem;
      color: #fa8a01;
      text-align: center;
    }

    .btn-play {
      display: inline-block;
      margin: 8px auto;
      padding: 10px 18px;
      background: #fa8a01;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
      cursor: pointer;
    }

    .btn-play:hover {
      background: #fff;
      color: #000;
      transform: scale(1.05);
    }

    /* === Vídeo de abertura (vinheta) === */
.banner-video {
  width: 100%;
  max-height: 300px; /* altura menor */
  overflow: hidden;  /* evita corte estranho */
  display: flex;
  justify-content: center;
  align-items: center;
}

.banner-video video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* preenche sem cortar estranhamente */
  border-bottom: 2px solid #fa8a01;
}

/* === Miniaturas dos vídeos === */
.video-thumb {
  width: 100%;
  height: 180px;  /* altura menor para não cortar */
  border-radius: 10px;
  object-fit: cover;
  background-size: cover;
  background-position: center center;

}

/* Miniaturas dos vídeos */
.video-thumb {
  width: 100%;
  height: 180px;              /* altura fixa para ficar uniforme */
  border-radius: 10px;
  background-size: contain;   /* mostra o vídeo inteiro */
  background-repeat: no-repeat;
  background-position: center;
  background-color: #000;     /* fundo preto para não ficar vazio */
}



    /* Curtidas */
    .video-card .curtir {
      background: none;
      border: none;
      color: #fa8a01;
      font-size: 20px;
      cursor: pointer;
      margin-top: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      transition: transform 0.2s ease;
    }

    .video-card .curtir:hover {
      transform: scale(1.3);
    }

    .curtir.animado {
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); color: #ff4081; }
      100% { transform: scale(1); color: #fa8a01; }
    }

    /* Ranking */
    #ranking-list li {
      padding: 10px;
      margin-bottom: 8px;
      background: #222;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.5s forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal.show { display: flex; opacity: 1; }

    .modal-content {
      position: relative;
      background: #000;
      padding: 10px;
      border-radius: 12px;
      max-width: 900px;
      width: 90%;
      transform: scale(0.7);
      transition: transform 0.3s ease;
    }
    .modal.show .modal-content { transform: scale(1); }

    .modal-content iframe {
      width: 100%;
      height: 500px;
      border-radius: 12px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 0;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }
    .close:hover { color: #fa8a01; transform: rotate(90deg); }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #888;
      font-size: 0.9rem;
    }

    .btn-retorno {
      background: #fa8a01;
      color: #000;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-retorno:hover { background: #fff; color: #000; }

    /* Animações de entrada */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <img src="img/beplay.jpg" alt="Beplay Logo">
    <div class="banner-video">
      <video autoplay muted loop playsinline>
        <source src="videos/vinheta2.mp4" type="video/mp4">
      </video>
    </div>
  </header>

  <main>
    <section class="videos-grid">
      <div class="video-card" data-video="https://www.youtube.com/embed/gBkon6LC2OU">
        <div class="video-thumb"></div>
        <h3>Treino Técnico e Tático</h3>
        <button class="btn-play">▶ Assistir Agora</button>
        <button class="curtir">❤️ <span class="curtidas">0</span></button>
      </div>

      <div class="video-card" data-video="https://www.youtube.com/embed/Qi1lRW18kvM">
        <div class="video-thumb"></div>
        <h3>Duda e o Futebol</h3>
        <button class="btn-play">▶ Assistir Agora</button>
        <button class="curtir">❤️ <span class="curtidas">0</span></button>
      </div>

      <div class="video-card" data-video="https://www.youtube.com/embed/dYiX4fvxGG8">
        <div class="video-thumb"></div>
        <h3>Futebol e Areia</h3>
        <button class="btn-play">▶ Assistir Agora</button>
        <button class="curtir">❤️ <span class="curtidas">0</span></button>
      </div>
    </section>
  </main>

  <div style="text-align:center; margin:20px;">
    <a href="index.html" class="btn-retorno">⬅ Voltar para Início</a>
  </div>

  <section id="ranking" style="padding:30px; background:#111; margin-top:30px; border-top:2px solid #fa8a01;">
    <h2 style="color:#fa8a01; text-align:center;">🏆 Ranking dos Mais Curtidos</h2>
    <ul id="ranking-list" style="list-style:none; padding:0; margin-top:20px; max-width:600px; margin:auto; font-size:1.1rem; color:#fff;"></ul>
  </section>

  <footer>&copy; 2025 Bem Esportivo - Beplay</footer>

  <div id="videoModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <iframe src="" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // Thumbnails YouTube
    document.querySelectorAll(".video-card").forEach(card => {
      const videoUrl = card.dataset.video;
      const videoId = videoUrl.split("/embed/")[1];
      card.querySelector(".video-thumb").style.backgroundImage = `url(https://img.youtube.com/vi/${videoId}/maxresdefault.jpg)`;
    });

    // Modal
    const modal = document.getElementById("videoModal");
    const modalIframe = modal.querySelector("iframe");
    const closeBtn = modal.querySelector(".close");

    document.querySelectorAll(".btn-play").forEach(btn => {
      btn.addEventListener("click", e => {
        const card = e.target.closest(".video-card");
        modal.classList.add("show");
        modalIframe.src = card.dataset.video + "?autoplay=1";
      });
    });

    function fecharModal(){
      modal.classList.remove("show");
      modalIframe.src = "";
    }
    closeBtn.addEventListener("click", fecharModal);
    window.addEventListener("click", e => { if(e.target === modal) fecharModal(); });
    window.addEventListener("keydown", e => { if(e.key === "Escape") fecharModal(); });

    // Curtidas + Ranking
    function atualizarRanking() {
      const rankingList = document.getElementById("ranking-list");
      rankingList.innerHTML = "";
      let itens = [];

      document.querySelectorAll(".video-card").forEach(card => {
        const titulo = card.querySelector("h3").innerText;
        const curtidas = parseInt(card.querySelector(".curtidas").innerText);
        itens.push({titulo, curtidas});
      });

      itens.sort((a,b) => b.curtidas - a.curtidas);

      itens.forEach(item => {
        if(item.curtidas > 0){
          const li = document.createElement("li");
          li.textContent = `${item.titulo} — ❤️ ${item.curtidas}`;
          rankingList.appendChild(li);
        }
      });
    }

    document.querySelectorAll(".curtir").forEach(btn => {
      btn.addEventListener("click", () => {
        const span = btn.querySelector(".curtidas");
        span.textContent = parseInt(span.textContent) + 1;
        btn.classList.add("animado");
        setTimeout(()=>btn.classList.remove("animado"),400);
        atualizarRanking();
      });
    });

    // Scroll animation (cards aparecem suavemente)
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add("visible");
        }
      });
    }, {threshold:0.2});

    document.querySelectorAll(".video-card").forEach(card => observer.observe(card));
  </script>
</body>
</html>
