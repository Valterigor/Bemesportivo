<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#101010">
  <title>Login | KOBEM Performance</title>
  <link rel="icon" href="img/logobemoficial.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/performance.css">
</head>
<body class="kobem-body">
  <header class="kobem-topbar">
    <div class="kobem-shell kobem-topbar-inner">
      <a class="kobem-brand" href="performance.html"><span class="kobem-brand-mark"><img src="img/logobemoficial.png" alt="Bem Esportivo"></span><span><span>Bem Esportivo</span><strong>KOBEM Performance</strong></span></a>
      <nav class="kobem-nav"><a href="performance.html">Produto</a><a href="cadastro.html">Começar agora</a><a href="/">Bem Esportivo</a></nav>
    </div>
  </header>
  <main class="kobem-app">
    <div class="kobem-shell">
      <section class="kobem-page-title">
        <span class="kobem-eyebrow">Volte para o jogo</span>
        <h1>Entrar no KOBEM.</h1>
        <p>Acesse seu dashboard, registre o check-in do dia e acompanhe sua evolução.</p>
      </section>
      <section class="kobem-card kobem-panel">
        <form class="kobem-form" id="kobemLoginForm">
          <div class="kobem-field"><label>E-mail</label><input name="email" type="email" required placeholder="voce@email.com"></div>
          <div class="kobem-field"><label>Senha</label><input name="password" type="password" required placeholder="Sua senha"></div>
          <button class="kobem-btn" type="submit">Entrar</button>
          <a class="kobem-btn ghost" href="cadastro.html">Criar cadastro</a>
        </form>
      </section>
    </div>
  </main>
  <div class="kobem-toast" data-kobem-toast></div>
  <script src="js/performance.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
